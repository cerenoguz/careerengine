name: CareerEngine Daily Job Report

on:
  workflow_dispatch:
  schedule:
    # Runs every morning at 6:47 AM New York time
    - cron: "47 6 * * *"
      timezone: "America/New_York"

jobs:
  run-careerengine:
    runs-on: ubuntu-latest

    env:
      CAREERENGINE_SEND_EMAIL: ${{ secrets.CAREERENGINE_SEND_EMAIL }}
      CAREERENGINE_SMTP_HOST: ${{ secrets.CAREERENGINE_SMTP_HOST }}
      CAREERENGINE_SMTP_PORT: ${{ secrets.CAREERENGINE_SMTP_PORT }}
      CAREERENGINE_EMAIL_FROM: ${{ secrets.CAREERENGINE_EMAIL_FROM }}
      CAREERENGINE_EMAIL_TO: ${{ secrets.CAREERENGINE_EMAIL_TO }}
      CAREERENGINE_EMAIL_USERNAME: ${{ secrets.CAREERENGINE_EMAIL_USERNAME }}
      CAREERENGINE_EMAIL_PASSWORD: ${{ secrets.CAREERENGINE_EMAIL_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Restore deduplication database cache
        uses: actions/cache@v4
        with:
          path: data/careerengine.sqlite
          key: seen-jobs-${{ github.run_id }}
          restore-keys: |
            seen-jobs-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest

      - name: Run CareerEngine
        run: |
          python -m src.main

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: careerengine-daily-report
          path: |
            reports/daily_report.txt
            reports/unsent_recommendations.txt
            data/careerengine.sqlite
          if-no-files-found: warn
