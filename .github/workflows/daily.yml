name: CareerEngine Daily Job Report

on:
  workflow_dispatch:
    inputs:
      send_email:
        description: "Send the email report for this manual run"
        required: true
        default: false
        type: boolean
  schedule:
    # Runs every morning at 6:47 AM New York time
    - cron: "47 6 * * *"
      timezone: "America/New_York"

concurrency:
  group: careerengine-daily-report
  cancel-in-progress: false

jobs:
  run-careerengine:
    runs-on: ubuntu-latest

    env:
      CAREERENGINE_SEND_EMAIL: ${{ github.event_name == 'workflow_dispatch' && inputs.send_email || secrets.CAREERENGINE_SEND_EMAIL }}
      CAREERENGINE_SMTP_HOST: ${{ secrets.CAREERENGINE_SMTP_HOST }}
      CAREERENGINE_SMTP_PORT: ${{ secrets.CAREERENGINE_SMTP_PORT }}
      CAREERENGINE_EMAIL_FROM: ${{ secrets.CAREERENGINE_EMAIL_FROM }}
      CAREERENGINE_EMAIL_TO: ${{ secrets.CAREERENGINE_EMAIL_TO }}
      CAREERENGINE_EMAIL_USERNAME: ${{ secrets.CAREERENGINE_EMAIL_USERNAME }}
      CAREERENGINE_EMAIL_PASSWORD: ${{ secrets.CAREERENGINE_EMAIL_PASSWORD }}
      CAREERENGINE_CANDIDATE_PROFILE: ${{ secrets.CAREERENGINE_CANDIDATE_PROFILE }}
      CAREERENGINE_ENABLE_SEMANTIC_SHADOW: "true"
      CAREERENGINE_SEMANTIC_BATCH_SIZE: "32"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Restore Sentence-BERT model cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: sentence-bert-${{ runner.os }}-all-minilm-l6-v2-v1

      - name: Restore CareerEngine delivery-state cache
        uses: actions/cache@v4
        with:
          path: data/careerengine.sqlite
          key: careerengine-state-v4-${{ github.run_id }}
          restore-keys: |
            careerengine-state-v4-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest

      - name: Restore private candidate profile
        run: |
          if [ -z "$CAREERENGINE_CANDIDATE_PROFILE" ]; then
            echo "::error::Missing CAREERENGINE_CANDIDATE_PROFILE GitHub Secret."
            exit 1
          fi

          printf '%s' "$CAREERENGINE_CANDIDATE_PROFILE" > config/candidate_profile.txt

      - name: Run CareerEngine
        env:
          CAREERENGINE_ENABLE_SEMANTIC_SHADOW: "true"
        run: |
          python -m src.main

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: careerengine-daily-report
          path: |
            reports/daily_report.txt
            reports/additional_qualified_opportunities.txt
            reports/semantic_shadow_report.txt
            reports/semantic_review_queue.csv
            data/careerengine.sqlite
          if-no-files-found: warn
